  <main>
    <div class="contact-section">
      <div class="contact-title">
        <h1>Contact</h1>
        <p>お仕事のご依頼やお問い合わせは,右記のフォームまたはSNSよりお願いいたします。</p>
        <div class="contact-sns">
          <a href="https://www.instagram.com/ima__347?igsh=dmYwN210emM5Y2Zu&utm_source=qr" target="_blank">Instagram</a>
          <a href="#" target="_blank">X (Twitter)</a>
        </div>
      </div>
      <div class="contact-form-container">
        <form action="#" method="POST" class="contact-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required placeholder="お名前">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="メールアドレス">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required placeholder="お問い合せ内容"></textarea>
          </div>
          <button type="submit" class="submit-btn">Send</button>
        </form>
      </div>
    </div>
  </main>
</body>
